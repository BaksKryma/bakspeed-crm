project_id = "bakspeed-crm"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["https://app.bakspeed.pl"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.nbp_daily_sync]
verify_jwt = false

[functions.parse_pdf_order]
verify_jwt = true

[functions.generate_carrier_order_pdf]
verify_jwt = true

[functions.generate_driver_brief]
verify_jwt = true

[functions.saldeo_create_invoice]
verify_jwt = true

[functions.whitelist_check]
verify_jwt = true

[functions.fleethand_build_route]
verify_jwt = true

[functions.daily_digest]
verify_jwt = false

[functions.auto_accept_timer]
verify_jwt = false

[functions.payment_reminders_scan]
verify_jwt = false

[functions.documents_missing_scan]
verify_jwt = false

[functions.thermograph_missing_scan]
verify_jwt = false

[functions.pallets_missing_scan]
verify_jwt = false

[functions.insurance_expiry_scan]
verify_jwt = false

[functions.driver_webview]
verify_jwt = false
